services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8555:80"
    environment:
      APP_NAME: Laravel
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8555
      DB_CONNECTION: sqlite
      DB_DATABASE: /data/database.sqlite
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      VITE_APP_NAME: Laravel
    volumes:
      - sqlite-data:/data

volumes:
  sqlite-data:
